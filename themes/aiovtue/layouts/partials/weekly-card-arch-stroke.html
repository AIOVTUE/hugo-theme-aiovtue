{{- $side := .Side | default "left" -}}
<div class="weekly-card__arch-stroke weekly-card__arch-stroke--{{ $side }}" aria-hidden="true">
  {{- if eq $side "right" -}}
    <svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true" focusable="false">
      <path d="M 92 0 C 97 20 100 34 100 50 C 100 66 97 80 90 100" fill="none" stroke="currentColor" vector-effect="non-scaling-stroke" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  {{- else -}}
    <svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true" focusable="false">
      <path d="M 8 0 C 3 20 0 34 0 50 C 0 66 3 80 10 100" fill="none" stroke="currentColor" vector-effect="non-scaling-stroke" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  {{- end -}}
</div>
