<meta http-equiv="content-language" content="zh-CN">
<style id="sakura-anti-translate">
  .goog-te-banner-frame,
  .goog-te-menu-frame,
  .goog-te-balloon-frame,
  #goog-gt-tt,
  .skiptranslate,
  body > .skiptranslate,
  iframe.goog-te-banner-frame,
  iframe.skiptranslate {
    display: none !important;
    visibility: hidden !important;
    height: 0 !important;
    width: 0 !important;
    pointer-events: none !important;
  }
  html,
  body {
    top: 0 !important;
    position: static !important;
  }
</style>
<script>
;(function () {
  var SELECTOR = 'iframe.goog-te-banner-frame, .skiptranslate, #goog-gt-tt, .goog-te-menu-frame, .goog-te-balloon-frame, .goog-te-spinner-pos'

  function lockLanguage() {
    var root = document.documentElement
    root.lang = 'zh-CN'
    root.setAttribute('translate', 'no')
    root.classList.add('notranslate')
    if (document.body) {
      document.body.setAttribute('translate', 'no')
      document.body.classList.add('notranslate')
      document.body.style.top = '0'
      document.body.style.position = ''
    }
  }

  function dismissTranslateUi() {
    lockLanguage()
    document.querySelectorAll(SELECTOR).forEach(function (el) {
      el.remove()
    })
  }

  lockLanguage()
  dismissTranslateUi()

  if (typeof MutationObserver !== 'undefined') {
    new MutationObserver(dismissTranslateUi).observe(document.documentElement, {
      childList: true,
      subtree: true,
    })
  }

  window.addEventListener('sakura:page-content-visible', dismissTranslateUi)
  window.__sakuraDismissTranslateUi = dismissTranslateUi
})()
</script>
